  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | StartupSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-theme="dark">

  <nav class="navbar premium-nav">
    <div class="container">
      <a class="logo" href="index.html"><i class="fa-solid fa-rocket"></i> StartupSphere</a>
      <button class="hamburger-btn" onclick="toggleMobileNav(this)">☰</button>
      <div class="nav-menu" id="mobile-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="ideas.html"><i class="fa-solid fa-lightbulb"></i> Ideas</a>
        <a href="forum.html"><i class="fa-solid fa-users"></i> Community</a>
        <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="login-btn">Login</a>
        <a href="signup.html" class="btn btn-primary">Get Started</a>
        <button onclick="toggleTheme()" class="btn btn-dark theme-toggle-btn">🌙</button>
        <a href="messages.html" class="messages-nav-icon" title="Messages"><i class="fa-solid fa-comments"></i></a>
      </div>
    </div>
  </nav>

  <div class="container section d-flex justify-content-center align-items-center" style="min-height:80vh;">
    <div class="glass-card" style="width:100%;max-width:440px;animation:fadeUp 0.6s ease both;">

      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:44px;margin-bottom:12px;">🔑</div>
        <h2 style="font-size:24px;margin-bottom:6px;">Forgot Password?</h2>
        <p class="muted">Enter your email and we'll send you a reset link.</p>
      </div>

      <div id="form-message" style="display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center;"></div>

      <form id="forgot-form">
        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control" id="forgot-email" placeholder="you@example.com" required>
        </div>
        <button type="button" class="btn btn-primary w-100" id="forgot-btn" style="padding:12px;font-size:15px;" onclick="sendResetLink(this)">
          Send Reset Link
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text3);">
        Remembered your password? <a href="login.html" style="color:var(--accent2);">Back to Login</a>
      </p>

    </div>
  </div>

  <footer><p>© 2026 StartupSphere. Built for innovators 🚀</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script>
    const API_BASE = "http://localhost:8000";

    function showMessage(text, type) {
      const box = document.getElementById('form-message');
      box.textContent = text;
      box.style.display = 'block';
      if (type === 'error') {
        box.style.background = 'rgba(239,68,68,0.12)';
        box.style.color = '#f87171';
        box.style.border = '1px solid rgba(239,68,68,0.25)';
      } else {
        box.style.background = 'rgba(16,185,129,0.12)';
        box.style.color = '#34d399';
        box.style.border = '1px solid rgba(16,185,129,0.25)';
      }
    }

    async function sendResetLink(btn) {
      const email = document.getElementById('forgot-email').value.trim();

      if (!email) {
        const input = document.getElementById('forgot-email');
        input.style.borderColor = '#ef4444';
        setTimeout(() => { input.style.borderColor = ''; }, 2000);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`${API_BASE}/users/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        showMessage(data.message || 'If this email is registered, a reset link has been sent.', 'success');
        document.getElementById('forgot-form').style.display = 'none';

      } catch (err) {
        showMessage('Could not connect to server. Is the backend running?', 'error');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }
  </script>
  </body>
  </html>
