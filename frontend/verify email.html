<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | StartupSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">

<nav class="navbar premium-nav">
  <div class="container">
    <a class="logo" href="index.html"><i class="fa-solid fa-rocket"></i> StartupSphere</a>
  </div>
</nav>

<div class="container section d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="glass-card text-center" style="width:100%;max-width:460px;">

    <div id="loading-state">
      <div style="font-size:48px;margin-bottom:16px;">⏳</div>
      <h3>Verifying your email...</h3>
      <p class="muted">Please wait a moment.</p>
    </div>

    <div id="success-state" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">✅</div>
      <h3>Email Verified!</h3>
      <p class="muted" style="margin-bottom:24px;">Your account is now fully activated.</p>
      <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
    </div>

    <div id="error-state" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">😕</div>
      <h3>Verification Failed</h3>
      <p class="muted" style="margin-bottom:24px;" id="error-message">This link is invalid or has expired.</p>
      <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
    </div>

  </div>
</div>

<footer><p>© 2026 StartupSphere. Built for innovators 🚀</p></footer>

<script>
  const API_BASE = "https://project1-1-ltbk.onrender.com";

  async function verifyEmail() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showError('No verification token provided.');
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/users/verify-email?token=${encodeURIComponent(token)}`);
      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Verification failed.');
        return;
      }

      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';

      // Update local user data if logged in
      const userStr = localStorage.getItem('ss_user');
      if (userStr) {
        const user = JSON.parse(userStr);
        user.is_verified = true;
        localStorage.setItem('ss_user', JSON.stringify(user));
      }

    } catch (err) {
      showError('Could not connect to server.');
    }
  }

  function showError(msg) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('error-message').textContent = msg;
  }

  verifyEmail();
</script>
</body>
</html>
