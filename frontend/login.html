<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StartupSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">

<nav class="navbar premium-nav">
  <div class="container">
    <a class="logo" href="index.html"><i class="fa-solid fa-rocket"></i> StartupSphere</a>
    <button class="hamburger-btn" onclick="toggleMobileNav(this)">☰</button>
    <div class="nav-menu" id="mobile-nav">
      <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="ideas.html"><i class="fa-solid fa-lightbulb"></i> Ideas</a>
      <a href="forum.html"><i class="fa-solid fa-users"></i> Community</a>
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="login-btn active">Login</a>
      <a href="signup.html" class="btn btn-primary">Get Started</a>
      <button onclick="toggleTheme()" class="btn btn-dark theme-toggle-btn"><i class="fa-solid fa-moon"></i></button>
      <a href="messages.html" class="messages-nav-icon" title="Messages"><i class="fa-solid fa-comments"></i></a>
    </div>
  </div>
</nav>

<div class="container section d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="glass-card" style="width:100%;max-width:440px;animation:fadeUp 0.6s ease both;">

    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:44px;margin-bottom:12px;"><i class="fa-solid fa-hand-sparkles"></i></div>
      <h2 style="font-size:24px;margin-bottom:6px;">Welcome Back</h2>
      <p class="muted">Sign in to your StartupSphere account.</p>
    </div>

    <!-- ERROR / SUCCESS MESSAGE -->
    <div id="form-message" style="display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center;"></div>

    <form id="login-form">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          Password
          <a href="forgot-password.html" style="font-size:12px;color:var(--accent2);">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="password-input" placeholder="Enter your password" required>
          <button type="button" id="password-toggle-btn" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="mb-3" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="remember" style="accent-color:var(--accent);">
        <label for="remember" style="margin:0;font-size:13px;color:var(--text2);cursor:pointer;">Remember me for 30 days</label>
      </div>
      <button type="button" class="btn btn-primary w-100" id="login-btn" style="padding:12px;font-size:15px;" onclick="doLogin(this)">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text3);">
      Don't have an account? <a href="signup.html" style="color:var(--accent2);">Sign up free</a>
    </p>

  </div>
</div>

<footer><p>© 2026 StartupSphere. Built for innovators <i class="fa-solid fa-rocket"></i></p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  const API_BASE = "http://localhost:8000";

  function togglePassword() {
    const input = document.getElementById('password-input');
    const icon = document.querySelector('#password-toggle-btn i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa-solid fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa-solid fa-eye';
    }
  }

  function showMessage(text, type, html) {
    const box = document.getElementById('form-message');
    if (html) {
      box.innerHTML = text;
    } else {
      box.textContent = text;
    }
    box.style.display = 'block';
    if (type === 'error') {
      box.style.background = 'rgba(239,68,68,0.12)';
      box.style.color = '#f87171';
      box.style.border = '1px solid rgba(239,68,68,0.25)';
    } else {
      box.style.background = 'rgba(16,185,129,0.12)';
      box.style.color = '#34d399';
      box.style.border = '1px solid rgba(16,185,129,0.25)';
    }
  }

  async function resendVerification(email, btn) {
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const res = await fetch(`${API_BASE}/users/resend-verification-by-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      showMessage(data.message || 'Verification email sent. Check your inbox.', 'success');
    } catch (err) {
      showMessage('Could not connect to server.', 'error');
    }
  }

  async function doLogin(btn) {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('password-input').value;

    const inputs = document.querySelectorAll('#login-form input[required]');
    let valid = true;
    inputs.forEach(input => {
      if (!input.value.trim()) {
        input.style.borderColor = '#ef4444';
        valid = false;
        setTimeout(() => { input.style.borderColor=''; }, 2000);
      }
    });
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Signing In...';

    try {
      const res = await fetch(`${API_BASE}/users/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        if (data.detail === 'EMAIL_NOT_VERIFIED') {
          showMessage(
            `Please verify your email before logging in. <button onclick="resendVerification('${email.replace(/'/g, "\\'")}', this)" style="background:none;border:none;color:#34d399;text-decoration:underline;font-weight:600;cursor:pointer;padding:0;font-size:13px;">Resend verification email</button>`,
            'error',
            true
          );
        } else {
          showMessage(
            'No account found with this email, or password is incorrect. <a href="signup.html" style="color:#34d399;text-decoration:underline;font-weight:600;">Sign up first →</a>',
            'error',
            true
          );
        }
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      localStorage.setItem('ss_token', data.access_token);
      localStorage.setItem('ss_user', JSON.stringify(data.user));

      btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Signed In!';
      btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
      showMessage('Login successful! Redirecting...', 'success');

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

    } catch (err) {
      showMessage('Could not connect to server. Is the backend running?', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
